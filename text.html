<div id="book" data-aos="fade-left">
    <div class="contact-card">
        <h3 class="text-2xl font-bold text-[var(--fg)] mb-6">Book Your Stay</h3>

        <form id="bookingForm" class="space-y-6">
            <div class="grid sm:grid-cols-2 gap-6">
                <!-- Name -->
                <div>
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" id="name" name="name" required class="form-input" placeholder="Your name">
                </div>
                <!-- Email -->
                <div>
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" name="email" required class="form-input"
                        placeholder="you@example.com">
                </div>
            </div>

            <div class="grid sm:grid-cols-2 gap-6">
                <!-- Check-in -->
                <div>
                    <label for="checkin" class="form-label">Check-in Date</label>
                    <input type="date" id="checkin" name="checkin" required class="form-input">
                </div>
                <!-- Check-out -->
                <div>
                    <label for="checkout" class="form-label">Check-out Date</label>
                    <input type="date" id="checkout" name="checkout" required class="form-input">
                </div>
            </div>

            <div class="grid sm:grid-cols-2 gap-6">
                <!-- Room Type -->
                <div>
                    <label for="room" class="form-label">Room Type</label>
                    <select id="room" name="room" required class="form-input">
                        <option value="" disabled selected>Select a room</option>
                        <option value="luxury">Luxury Room ($75)</option>
                        <option value="villa">Entire Villa ($250)</option>
                        <option value="standard">Standard AC ($55)</option>
                        <option value="economy">Economy ($35)</option>
                    </select>
                </div>
                <!-- Guests -->
                <div>
                    <label for="guests" class="form-label">Guests</label>
                    <select id="guests" name="guests" required class="form-input">
                        <option value="" disabled selected>Select guests</option>
                        <option value="1">1 Guest</option>
                        <option value="2">2 Guests</option>
                        <option value="3">3 Guests</option>
                        <option value="4">4 Guests</option>
                        <option value="5+">5+ Guests</option>
                    </select>
                </div>
            </div>

            <!-- Special Requests -->
            <div>
                <label for="message" class="form-label">Special Requests</label>
                <textarea id="message" name="message" rows="3" class="form-input"
                    placeholder="Any special requirements..."></textarea>
            </div>

            <button type="submit" class="btn-primary w-full justify-center">
                Request Booking
            </button>

            <p class="text-xs text-center text-[var(--muted)]">
                We'll respond within 24 hours to confirm availability.
            </p>
        </form>
    </div>
</div>
<!-- Right Column: Booking Form -->
